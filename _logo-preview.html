<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  body { margin: 0; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: system-ui, sans-serif; }
  .card { background: #fff; border-radius: 16px; padding: 40px 60px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }
  .dark { background: #0f172a; }
</style>
</head>
<body>
  <div class="card">
    <span class="label">Fond clair — taille réelle (header)</span>
    <img src="/logo.svg" height="32" />
  </div>
  <div class="card">
    <span class="label">Grande taille</span>
    <img src="/logo.svg" height="56" />
  </div>
  <div class="card dark">
    <span class="label" style="color:#475569">Fond sombre</span>
    <img src="/logo.svg" height="40" />
  </div>
</body>
</html>

<!doctype html>
<html lang="{{lang}}" data-page-title-key="cpf_page_meta_title" data-page-desc-key="cpf_page_meta_description">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{cpf_page_meta_title}}</title>
    <meta name="description" content="{{cpf_page_meta_description}}" />

    <meta property="og:title" content="{{cpf_page_meta_title}}" />
    <meta property="og:description" content="{{cpf_page_meta_description}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{cpf_page_og_url}}" />
    <meta property="og:image" content="{{og_image_url}}" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{cpf_page_meta_title}}" />
    <meta name="twitter:description" content="{{cpf_page_meta_description}}" />
    <meta name="twitter:image" content="https://formations.adsvizor.com{{og_image_url}}" />
    <meta name="robots" content="index, follow" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/main.css?v=4" />
    <script defer src="/script.js?v=16"></script>
  <style>
    /* Logo */
    .site-logo { height: 60px; width: auto; }
    @media (min-width: 768px) { .site-logo { height: 72px; } }
    /* Mobile nav — inline so it bypasses CDN cache */
    @media (max-width: 767px) {
      .nav-toggle { display: flex !important; }
      header nav:not(.is-open) { display: none !important; }
    }
    @media (min-width: 768px) {
      .nav-toggle { display: none !important; }
      header nav { display: block !important; }
    }
  </style>
  </head>

  <body>
    <div class="cpf-cta-bar">
      <button class="cpf-cta-bar-btn" type="button" data-cta-id="cpf-bar-formations"
        onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth',block:'start'});setTimeout(function(){var i=document.querySelector('#contact input:not([type=hidden])');if(i)i.focus({preventScroll:true});},600)">
        Vérifier mes droits CPF →
      </button>
    </div>
    <header>
      <div>
        <a href="{{home_href}}" class="site-logo-link"><img src="/logo.png" alt="{{logo_text}}" class="site-logo" /></a>
      </div>

      <nav aria-label="{{nav_aria_label}}">
        <ul>
          <li><a href="{{nav_item_0_href}}">{{nav_item_0_label}}</a></li>
          <li><a href="{{nav_item_1_href}}">{{nav_item_1_label}}</a></li>
          <li><a href="{{nav_item_2_href}}">{{nav_item_2_label}}</a></li>
          <li><a href="{{nav_item_3_href}}">{{nav_item_3_label}}</a></li>
          <li><a href="{{nav_item_4_href}}">{{nav_item_4_label}}</a></li>
        </ul>
      </nav>
    </header>
    <button class="nav-toggle" aria-expanded="false" aria-label="Ouvrir le menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <main>
      <div class="page-layout">
        <div class="page-content">

          <section class="cpf-hero" aria-labelledby="cpf-hero-title">
            <span class="cpf-badge">Top 10 — 2026</span>
            <h1 id="cpf-hero-title">{{cpf_page_title}}</h1>
            <p class="cpf-hero-sub">{{cpf_page_subtitle}}</p>
          </section>

          <section class="cpf-grid-section" aria-label="Formations CPF disponibles">
            <ul id="formation-list" class="formation-list">
              <li class="formation-list-loading">Chargement des formations…</li>
            </ul>
          </section>

        </div>

        <aside class="form-float">
          <section aria-labelledby="lead-form-title" id="contact">
            <h2 id="lead-form-title">{{form_title}}</h2>

            <!-- ═══════════════════════════════════════════════════
                 FORMULAIRE SIMPLE (1 étape) — actif
                 Pour revenir au formulaire 2-étapes :
                   1. Supprimer data-simple="true" du <form>
                   2. Restaurer les éléments form-progress, form-step-labels,
                      form-step[data-step="0"], form-step[data-step="1"]
                 ═══════════════════════════════════════════════════ -->
            <form
              id="{{form_id}}"
              action="{{form_action}}"
              method="post"
              autocomplete="on"
              data-client-slug="{{client_slug}}"
              data-offer-id="{{offer_id}}"
              data-simple="true"
            >
              <div class="form-name-row">
                <div>
                  <label for="first_name">{{field_first_name_label}}</label>
                  <input id="first_name" name="first_name" type="text" autocomplete="given-name" placeholder="{{field_first_name_placeholder}}" required />
                </div>
                <div>
                  <label for="last_name">{{field_last_name_label}}</label>
                  <input id="last_name" name="last_name" type="text" autocomplete="family-name" placeholder="{{field_last_name_placeholder}}" required />
                </div>
              </div>
              <div>
                <label for="phone">{{field_phone_label}}</label>
                <input id="phone" name="phone" type="tel" autocomplete="tel" inputmode="tel" placeholder="{{field_phone_placeholder}}" required />
              </div>
              <div>
                <label for="formation_select">{{field_formation_label}}</label>
                <select id="formation_select">
                  <option value="">-- {{field_formation_placeholder}} --</option>
                  <option value="Informatique &amp; Digital">{{field_formation_opt_digital}}</option>
                  <option value="Langues étrangères">{{field_formation_opt_langues}}</option>
                  <option value="Management &amp; Commerce">{{field_formation_opt_management}}</option>
                  <option value="Comptabilité &amp; Gestion">{{field_formation_opt_comptabilite}}</option>
                  <option value="Santé &amp; Social">{{field_formation_opt_sante}}</option>
                  <option value="Bilan de compétences">{{field_formation_opt_bilan}}</option>
                  <option value="Autre formation professionnelle">{{field_formation_opt_autre}}</option>
                </select>
                <input type="hidden" name="formation_interest" id="formation_interest_val" value="" />
              </div>
              <div class="form-consent">
                <input type="checkbox" id="consent_marketing" name="consent_marketing" />
                <label for="consent_marketing">{{form_disclaimer_text}}</label>
              </div>
              <!-- Honeypot -->
              <div class="form-honeypot" aria-hidden="true">
                <input type="text" name="hp_trap" id="hp_trap" autocomplete="nope" tabindex="-1" />
              </div>
              <input type="hidden" id="utm_source"   name="utm_source"   value="" />
              <input type="hidden" id="utm_medium"   name="utm_medium"   value="" />
              <input type="hidden" id="utm_campaign" name="utm_campaign" value="" />
              <input type="hidden" id="utm_term"     name="utm_term"     value="" />
              <input type="hidden" id="utm_content"  name="utm_content"  value="" />
              <input type="hidden" id="page_version" name="page_version" value="{{page_version}}" />
              <button type="submit">Vérifier mes droits CPF →</button>
            </form>
          </section>
        </aside>
      </div>
    </main>

    <footer>
      <p>{{footer_text}}</p>
    </footer>

    <!-- Google tag (gtag.js) — loaded after render for better PageSpeed -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GT-KD7C7TR3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GT-KD7C7TR3');
    gtag('config', 'AW-18122720723');
  </script>
</body>
</html>

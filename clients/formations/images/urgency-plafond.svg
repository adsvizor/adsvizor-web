<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff1f1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barFull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="barCapped" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Left: document illustration -->
  <g transform="translate(28, 24)">
    <!-- Document body -->
    <rect x="0" y="0" width="110" height="152" rx="8" fill="url(#docGrad)" stroke="#fca5a5" stroke-width="1.5"/>
    <!-- Dog-ear corner -->
    <polygon points="82,0 110,28 82,28" fill="#fca5a5" opacity="0.4"/>
    <polygon points="82,0 110,28 110,0" fill="#fee2e2"/>
    <!-- CPF logo text -->
    <rect x="12" y="14" width="56" height="22" rx="4" fill="#1d4ed8" opacity="0.9"/>
    <text x="40" y="29" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">CPF</text>
    <!-- Doc lines -->
    <rect x="12" y="46" width="86" height="5" rx="2.5" fill="#fca5a5" opacity="0.5"/>
    <rect x="12" y="58" width="70" height="5" rx="2.5" fill="#fca5a5" opacity="0.35"/>
    <rect x="12" y="70" width="78" height="5" rx="2.5" fill="#fca5a5" opacity="0.35"/>
    <!-- RS badge -->
    <rect x="12" y="86" width="40" height="18" rx="9" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="32" y="99" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">RS</text>
    <!-- Cap line visual -->
    <rect x="12" y="116" width="86" height="8" rx="4" fill="#d1fae5"/>
    <rect x="12" y="116" width="45" height="8" rx="4" fill="#ef4444"/>
    <!-- Cap label -->
    <text x="12" y="140" font-family="Arial,sans-serif" font-size="8.5" fill="#dc2626" font-weight="700">Plafond atteint</text>
  </g>

  <!-- Right: bar chart + explanation -->
  <g transform="translate(162, 20)">
    <!-- Title -->
    <text x="148" y="16" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="#9a3412" text-anchor="middle">Plafond CPF — Formations RS</text>

    <!-- RNCP row -->
    <text x="0" y="46" font-family="Arial,sans-serif" font-size="10.5" font-weight="700" fill="#374151">RNCP (diplômes, titres pro)</text>
    <rect x="0" y="52" width="290" height="20" rx="5" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
    <rect x="0" y="52" width="290" height="20" rx="5" fill="url(#barFull)"/>
    <text x="145" y="66" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Sans plafond ✓</text>

    <!-- RS row -->
    <text x="0" y="92" font-family="Arial,sans-serif" font-size="10.5" font-weight="700" fill="#374151">RS (formations certifiantes)</text>
    <rect x="0" y="98" width="290" height="20" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="0" y="98" width="145" height="20" rx="5" fill="url(#barCapped)"/>
    <!-- Cap marker -->
    <line x1="145" y1="94" x2="145" y2="124" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="148" y="104" font-family="Arial,sans-serif" font-size="9.5" font-weight="800" fill="#dc2626">1 500 € max</text>
    <text x="148" y="116" font-family="Arial,sans-serif" font-size="8.5" fill="#9a3412">au-delà = à votre charge</text>

    <!-- Decree note -->
    <rect x="0" y="133" width="290" height="32" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="10" y="146" font-family="Arial,sans-serif" font-size="8.5" fill="#92400e">
      <tspan font-weight="700">Décret n°2026-127 du 24 février 2026</tspan>
    </text>
    <text x="10" y="158" font-family="Arial,sans-serif" font-size="8" fill="#78350f">Applicable depuis le 26 février 2026 — formations RS uniquement.</text>
  </g>
</svg>

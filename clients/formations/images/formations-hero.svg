<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration catalogue formations CPF">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2d5a;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="badgeShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)" />

  <!-- Background glow circles -->
  <circle cx="450" cy="250" r="300" fill="#1d4ed8" opacity="0.06"/>
  <circle cx="150" cy="100" r="120" fill="#2563eb" opacity="0.08"/>
  <circle cx="780" cy="400" r="150" fill="#3b82f6" opacity="0.07"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="60" r="2.5" fill="#93c5fd" opacity="0.6"/>
  <circle cx="840" cy="60" r="2" fill="#93c5fd" opacity="0.5"/>
  <circle cx="60" cy="440" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="840" cy="440" r="2.5" fill="#93c5fd" opacity="0.6"/>
  <circle cx="450" cy="30" r="1.5" fill="#bfdbfe" opacity="0.5"/>

  <!-- Page title area -->
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#93c5fd" font-weight="500" letter-spacing="3">NOS FORMATIONS</text>

  <!-- 2x4 Grid of formation category cards -->
  <!-- Row 1 -->

  <!-- Card: Bureautique -->
  <g filter="url(#cardShadow)" transform="translate(55, 80)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#3b82f6"/>
    <!-- Icon circle -->
    <circle cx="88" cy="52" r="28" fill="#2563eb" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">💻</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Bureautique</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">Excel · Word · PowerPoint</text>
  </g>

  <!-- Card: Langues -->
  <g filter="url(#cardShadow)" transform="translate(250, 80)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#059669"/>
    <circle cx="88" cy="52" r="28" fill="#059669" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🌍</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Langues</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">Anglais · Espagnol · TOEIC</text>
  </g>

  <!-- Card: Management -->
  <g filter="url(#cardShadow)" transform="translate(445, 80)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#7c3aed"/>
    <circle cx="88" cy="52" r="28" fill="#7c3aed" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">📊</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Management</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c4b5fd">Leadership · Gestion de projet</text>
  </g>

  <!-- Card: Finance -->
  <g filter="url(#cardShadow)" transform="translate(640, 80)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#dc2626"/>
    <circle cx="88" cy="52" r="28" fill="#dc2626" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🧾</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Finance</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5">Comptabilité · Paie</text>
  </g>

  <!-- Row 2 -->

  <!-- Card: Bilan de Compétences -->
  <g filter="url(#cardShadow)" transform="translate(55, 235)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#0891b2"/>
    <circle cx="88" cy="52" r="28" fill="#0891b2" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🎯</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Bilan de Compétences</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#67e8f9">Orientation · Projet pro</text>
  </g>

  <!-- Card: Entrepreneuriat -->
  <g filter="url(#cardShadow)" transform="translate(250, 235)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#d97706"/>
    <circle cx="88" cy="52" r="28" fill="#d97706" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🚀</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Entrepreneuriat</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fcd34d">Création d'entreprise</text>
  </g>

  <!-- Card: Intelligence Artificielle -->
  <g filter="url(#cardShadow)" transform="translate(445, 235)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#8b5cf6"/>
    <circle cx="88" cy="52" r="28" fill="#8b5cf6" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🤖</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Intelligence Artificielle</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ddd6fe">ChatGPT · Outils IA</text>
  </g>

  <!-- Card: Développement Personnel -->
  <g filter="url(#cardShadow)" transform="translate(640, 235)">
    <rect width="175" height="130" rx="14" fill="#1e3a6e"/>
    <rect width="175" height="4" rx="2" fill="#16a34a"/>
    <circle cx="88" cy="52" r="28" fill="#16a34a" opacity="0.3"/>
    <text x="88" y="62" text-anchor="middle" font-size="28">🎓</text>
    <text x="88" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Dév. Personnel</text>
    <text x="88" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#86efac">Prise de parole · Soft skills</text>
  </g>

  <!-- CPF Badge at bottom center -->
  <g filter="url(#badgeShadow)" transform="translate(310, 400)">
    <rect width="280" height="68" rx="34" fill="#2563eb"/>
    <!-- Inner glow -->
    <rect x="2" y="2" width="276" height="64" rx="32" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <!-- CPF logo circle -->
    <circle cx="40" cy="34" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="900">CPF</text>
    <!-- Divider -->
    <line x1="72" y1="16" x2="72" y2="52" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Text -->
    <text x="180" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bfdbfe" font-weight="500">Formations éligibles</text>
    <text x="180" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="700">100% pris en charge</text>
  </g>
</svg>

<!doctype html>
<html lang="{{lang}}" data-page-title-key="cpf_page_meta_title" data-page-desc-key="cpf_page_meta_description">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{cpf_page_meta_title}}</title>
    <meta name="description" content="{{cpf_page_meta_description}}" />

    <meta property="og:title" content="{{cpf_page_meta_title}}" />
    <meta property="og:description" content="{{cpf_page_meta_description}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{cpf_page_og_url}}" />
    <meta property="og:image" content="{{og_image_url}}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css?v=8" />
    <script defer src="script.js?v=8"></script>
                      <style>
    .site-logo { height: 60px !important; width: auto !important; }
    @media (min-width: 768px) { .site-logo { height: 72px !important; } }
    /* Nav toggle — outside header, no backdrop-filter parent */
    .nav-toggle {
      display: none;
      position: fixed !important;
      top: 20px !important; right: 16px !important;
      z-index: 9999 !important;
      width: 48px !important; height: 48px !important;
      background: #2563eb !important; border: none !important;
      border-radius: 12px !important; cursor: pointer !important;
      flex-direction: column !important;
      justify-content: center !important; align-items: center !important;
      gap: 6px !important;
      box-shadow: 0 4px 20px rgba(37,99,235,0.45) !important;
    }
    .nav-toggle span { display: block !important; width: 24px !important; height: 3px !important; background: #fff !important; border-radius: 3px !important; transition: transform 260ms ease, opacity 200ms ease !important; }
    .nav-toggle[aria-expanded='true'] span:nth-child(1) { transform: translateY(9px) rotate(45deg) !important; }
    .nav-toggle[aria-expanded='true'] span:nth-child(2) { opacity: 0 !important; }
    .nav-toggle[aria-expanded='true'] span:nth-child(3) { transform: translateY(-9px) rotate(-45deg) !important; }
    @media (max-width: 767px) {
      .nav-toggle { display: flex !important; }
      header nav { display: none !important; }
      header nav.is-open {
        display: flex !important; flex-direction: column !important;
        position: fixed !important;
        top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
        background: #fff !important; z-index: 8000 !important;
        padding: 90px 28px 40px !important; gap: 10px !important;
        overflow-y: auto !important;
      }
      header nav.is-open ul { display: flex !important; flex-direction: column !important; gap: 10px !important; list-style: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }
      header nav.is-open li a { display: flex !important; align-items: center !important; font-size: 1.25rem !important; font-weight: 700 !important; color: #0f172a !important; padding: 18px 20px !important; border-radius: 14px !important; background: #f1f5f9 !important; border-left: 4px solid #2563eb !important; }
    }
    @media (min-width: 768px) {
      .nav-toggle { display: none !important; }
      header nav { display: block !important; }
    }
    </style>
  </head>

  <body>
    <header>
      <div>
        <a href="{{home_href}}" class="site-logo-link"><img src="/logo.png" alt="{{logo_text}}" class="site-logo" /></a>
      </div>

      <nav aria-label="{{nav_aria_label}}">
        <ul>
          <li><a href="{{nav_item_1_href}}">{{nav_item_1_label}}</a></li>
          <li><a href="{{nav_item_2_href}}">{{nav_item_2_label}}</a></li>
          <li><a href="{{nav_item_3_href}}">{{nav_item_3_label}}</a></li>
          <li><a href="{{nav_item_4_href}}">{{nav_item_4_label}}</a></li>
        </ul>
      </nav>
    </header>
    <button class="nav-toggle" aria-expanded="false" aria-label="Ouvrir le menu" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true'); document.querySelector('header nav').classList.toggle('is-open')">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <main>
      <section class="cpf-hero" aria-labelledby="cpf-hero-title">
        <span class="cpf-badge">Top 10 — 2025</span>
        <h1 id="cpf-hero-title">{{cpf_page_title}}</h1>
        <p class="cpf-hero-sub">{{cpf_page_subtitle}}</p>
      </section>

      <section class="cpf-grid-section" aria-label="Formations CPF disponibles">
        <ul id="formation-list" class="formation-list">
          <li class="formation-list-loading">Chargement des formations…</li>
        </ul>
      </section>
    </main>

    <footer>
      <p>{{footer_text}}</p>
    </footer>
  </body>
</html>

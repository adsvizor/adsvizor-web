name: Webuilder Agent — Generate Client Site

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - 'webuilder/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-client-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || format('webuilder/{0}', github.event.inputs.pr_number) }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Install webuilder dependencies
        run: npm install node-fetch pdf-parse mammoth xlsx
        working-directory: scripts

      - name: Check API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY not set"
            exit 1
          else
            echo "✅ ANTHROPIC_API_KEY is set"
          fi

      - name: Run Webuilder Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: node scripts/webuilder-agent.js

      - name: Commit generated site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Webuilder Agent"
          git config user.email "adsvizor@gmail.com"
          git add -A
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "webuilder: generate client site $(date +%Y-%m-%d)"
          git push

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Webuilder agent failed — PR #${context.payload.pull_request?.number || 'manual'}`,
              body: [
                '## Webuilder agent failed',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Consultez les logs pour diagnostiquer.'
              ].join('\n'),
              labels: ['bug', 'webuilder']
            });

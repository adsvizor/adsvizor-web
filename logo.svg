<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 36" fill="none" role="img" aria-label="AdsVizor">
  <title>AdsVizor</title>
  <defs>
    <linearGradient id="av-bg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="av-bar3" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.85)"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square background -->
  <rect width="36" height="36" rx="9" fill="url(#av-bg)"/>

  <!-- Rising bars (growth / learning progress) -->
  <rect x="6.5"  y="22" width="5.5" height="9"  rx="1.5" fill="rgba(255,255,255,0.45)"/>
  <rect x="15"   y="16" width="5.5" height="15" rx="1.5" fill="rgba(255,255,255,0.72)"/>
  <rect x="23.5" y="8"  width="5.5" height="23" rx="1.5" fill="url(#av-bar3)"/>

  <!-- Star accent above tallest bar -->
  <path d="M26.25 5.5 L26.9 4 L27.55 5.5 L29.1 5.5 L27.9 6.5 L28.35 8 L26.9 7 L25.45 8 L25.9 6.5 L24.7 5.5 Z" fill="rgba(255,255,255,0.9)"/>

  <!-- Wordmark -->
  <text
    x="46" y="25"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18.5"
    font-weight="700"
    letter-spacing="-0.6"
    fill="#0f172a">Ads</text>
  <text
    x="84" y="25"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18.5"
    font-weight="700"
    letter-spacing="-0.6"
    fill="#2563eb">Vizor</text>
</svg>

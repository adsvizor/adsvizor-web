<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{meta_title}}</title>
    <meta name="description" content="{{meta_description}}" />

    <meta property="og:title" content="{{meta_title}}" />
    <meta property="og:description" content="{{meta_description}}" />
    <meta property="og:type" content="{{og_type}}" />
    <meta property="og:url" content="{{og_url}}" />
    <meta property="og:image" content="{{og_image_url}}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css?v=8" />
    <script defer src="script.js?v=8"></script>
                <style>
    .site-logo { height: 60px !important; width: auto !important; }
    @media (min-width: 768px) { .site-logo { height: 72px !important; } }
    /* Show hamburger on ALL screen sizes for testing */
    header nav { display: none !important; }
    header nav.is-open {
      display: block !important; position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      background: rgba(255,255,255,0.98) !important; z-index: 8888 !important;
      padding: 100px 24px 40px !important; overflow-y: auto !important;
    }
    header nav.is-open ul { display: flex !important; flex-direction: column !important; gap: 8px !important; list-style: none !important; padding: 0 !important; margin: 0 !important; }
    header nav.is-open a { display: block !important; font-size: 1.3rem !important; font-weight: 700 !important; color: #0f172a !important; padding: 16px 20px !important; border-radius: 14px !important; background: #f8fafc !important; }
    .nav-toggle {
      display: flex !important; flex-direction: column !important;
      justify-content: center !important; align-items: center !important;
      gap: 6px !important; width: 52px !important; height: 52px !important;
      background: #2563eb !important; border: none !important;
      border-radius: 14px !important; cursor: pointer !important;
      position: fixed !important; top: 16px !important; right: 16px !important;
      z-index: 9999 !important;
      box-shadow: 0 4px 16px rgba(37,99,235,0.5) !important;
    }
    .nav-toggle span { display: block !important; width: 26px !important; height: 3px !important; background: #fff !important; border-radius: 3px !important; }
    </style>
  </head>

  <body>
    <header>
      <div>
        <a href="{{home_href}}" class="site-logo-link"><img src="/logo.png" alt="{{logo_text}}" class="site-logo" /></a>
      </div>

      <nav aria-label="{{nav_aria_label}}">
        <ul>
          <li><a href="{{nav_item_1_href}}">{{nav_item_1_label}}</a></li>
          <li><a href="{{nav_item_2_href}}">{{nav_item_2_label}}</a></li>
          <li><a href="{{nav_item_3_href}}">{{nav_item_3_label}}</a></li>
          <li><a href="{{nav_item_4_href}}">{{nav_item_4_label}}</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" aria-expanded="false" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main>
      <section class="thankyou" aria-labelledby="thankyou-title">
        <div class="thankyou-card">
          <div class="thankyou-icon" aria-hidden="true"></div>

          <h1 id="thankyou-title">{{thankyou_title}}</h1>
          <p>{{thankyou_message}}</p>

          <div class="security-code-block" id="security-code-block" hidden>
            <p class="security-code-label">{{security_code_label}}</p>
            <div class="security-code-value" id="security-code-value" aria-live="polite"></div>
            <p class="security-code-notice">{{security_code_notice}}</p>
          </div>

          <p>
            <a
              class="btn"
              href="{{thankyou_cta_href}}"
              data-cta-id="thankyou-cta"
              data-preserve-utm="true"
              >{{thankyou_cta_label}}</a
            >
          </p>
        </div>
      </section>
    </main>

    <footer>
      <p>{{footer_text}}</p>
    </footer>
  </body>
</html>
